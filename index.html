<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quartz</title>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        background: #ffffff;
      }
      #app-root {
        min-height: 100vh;
      }
      #app-root:empty + .loader {
        display: flex;
      }
      .loader {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        align-items: center;
        justify-content: center;
        background: #ffffff;
      }
      .jimu-primary-loading:before,
      .jimu-primary-loading:after {
        position: absolute;
        top: 0;
        content: '';
      }
      .jimu-primary-loading:before {
        left: -19.992px;
      }
      .jimu-primary-loading:after {
        left: 19.992px;
        animation-delay: 0.32s !important;
      }
      .jimu-primary-loading:before,
      .jimu-primary-loading:after,
      .jimu-primary-loading {
        background: #22c55e;
        animation: loading-keys-app-loading 0.8s infinite ease-in-out;
        width: 13.6px;
        height: 32px;
      }
      .jimu-primary-loading {
        text-indent: -9999em;
        margin: auto;
        position: absolute;
        right: calc(50% - 6.8px);
        top: calc(50% - 16px);
        animation-delay: 0.16s !important;
      }
      @keyframes loading-keys-app-loading {
        0%,
        80%,
        100% {
          opacity: 0.75;
          box-shadow: 0 0 #22c55e;
          height: 32px;
        }
        40% {
          opacity: 1;
          box-shadow: 0 -8px #22c55e;
          height: 40px;
        }
      }
    </style>
  </head>
  <body>
    <div id="app-root"></div>
    <div class="loader">
      <div class="jimu-primary-loading"></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
